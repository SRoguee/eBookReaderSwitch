name: eBookReaderSwitch CI pipeline

on: [push, pull_request, workflow_dispatch]

jobs:
  build:

    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - run: apt update && apt -y install libfreetype6-dev
    - name: Install switch portlibs
      run: |
        dkp-pacman -Sy --noconfirm
        dkp-pacman -S --needed --noconfirm \
          switch-sdl2 switch-sdl2_ttf switch-sdl2_image switch-freetype \
          switch-libconfig switch-libpng switch-libjpeg-turbo switch-libwebp \
          switch-zlib switch-bzip2
    - uses: actions/checkout@v4
    - name: Cache MuPDF
      uses: actions/cache@v4
      with:
        path: mupdf/build
        key: ${{ runner.os }}-mupdf-${{ hashFiles('Makefile.mupdf') }}

    - name: Building eBookReaderSwitch
      run: |
        export NODEBUG=true
        export PATH=$DEVKITPRO/portlibs/switch/bin:$PATH
        make mupdf && make -j$(nproc)

    - uses: actions/upload-artifact@v4
      with:
        name: eBookReaderSwitch
        path: '*.nro'
