name: eBookReaderSwitch CI pipeline

on: [push, pull_request, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - run: apt update && apt -y install libfreetype6-dev
    - name: Remove preinstalled mupdf (this repo builds its own copy)
      run: |
        rm -rf /opt/devkitpro/portlibs/switch/include/mupdf
        rm -f /opt/devkitpro/portlibs/switch/lib/libmupdf*
    - uses: actions/checkout@v4
    - name: Cache MuPDF
      uses: actions/cache@v4
      with:
        path: mupdf/build
        key: ${{ runner.os }}-mupdf-${{ hashFiles('Makefile.mupdf') }}

    - name: Building eBookReaderSwitch
      run: |
        export NODEBUG=true
        export PATH=$DEVKITPRO/portlibs/switch/bin:$PATH
        make mupdf && make -j$(nproc)

    - uses: actions/upload-artifact@v4
      with:
        name: eBookReaderSwitch
        path: '*.nro'
